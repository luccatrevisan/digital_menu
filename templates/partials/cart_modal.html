{% load static %}
{% block content %}

<!-- Floating Cart -->
<div class="carrinho-flutuante" onclick="openCart()">
    Carrinho
    <span class="badge-carrinho" id="cartBadge">0</span>
</div>

<!-- Cart Modal -->
<div id="modalCarrinho" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2>Seu Pedido</h2>
            <span class="close" onclick="closeCart()">&times;</span>
        </div>
        <div class="modal-body">
            <div id="cartItems"></div>
            <div class="total-carrinho">
                <div class="total-valor">Total: R$ <span id="cartTotal">0,00</span></div>
                <button id="checkout-btn">Finalizar</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}
